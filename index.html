<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="manifest.json">
    <title>Лента Припоминания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #6c5ce7;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --spoiler-bg: #f0f0f5;
            --border: #e0e0ea;
            --transition: all 0.2s ease;
            --text-scale: 1;
            --tag-bg: #e8e0f5;
            --tag-text: #4a2d7a;
        }

        [data-theme="dark"] {
            --bg: #12121a;
            --card-bg: #1e1e2e;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --spoiler-bg: #2a2a3e;
            --border: #33334a;
            --tag-bg: #2d1f4a;
            --tag-text: #c4b0e0;
        }

        html {
            font-size: calc(14px * var(--text-scale));
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* ===== Шапка ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent), #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            box-shadow: var(--shadow);
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        /* ===== Шрифт ===== */
        .font-panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            transition: var(--transition);
        }

        .font-panel label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .font-controls input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--accent);
            border-radius: 4px;
            outline: none;
        }

        .font-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--card-bg);
            box-shadow: var(--shadow);
        }

        .font-controls .size-label {
            min-width: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
        }

        .font-controls .btn-small {
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .font-controls .btn-small:active {
            transform: scale(0.92);
        }

        /* ===== Форма ===== */
        .form-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .form-box input,
        .form-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 10px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
        }

        .form-box input:focus,
        .form-box textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .form-box textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .form-row input {
            flex: 1;
            margin-bottom: 0;
        }

        .form-row .btn-sm {
            padding: 0 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .form-row .btn-sm:active {
            transform: scale(0.94);
        }

        .btn {
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            padding: 12px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-shuffle {
            background: #00b894;
            color: #fff;
            padding: 8px 16px;
            width: auto;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .controls .counter {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .controls .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.85rem;
            max-width: 140px;
        }

        .filter-group .clear-filter {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .filter-group .clear-filter:hover {
            background: #fee2e2;
            color: #e11d48;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ===== Карточка ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
            word-wrap: break-word;
        }

        .card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
            padding-left: 12px;
        }

        .card .tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: inline-block;
        }

        .answer-block {
            background: var(--spoiler-bg);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
        }

        .answer-block.revealed {
            background: var(--card-bg);
            border-color: var(--accent);
        }

        .answer-text {
            display: none;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text);
            word-wrap: break-word;
        }

        .answer-text img {
            max-width: 100%;
            border-radius: 6px;
        }

        .answer-text a {
            color: var(--accent);
            text-decoration: underline;
        }

        .answer-block.revealed .answer-text {
            display: block;
        }

        .answer-block.revealed .placeholder {
            display: none;
        }

        .placeholder {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .edit-actions {
            display: none;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .answer-block.revealed .edit-actions {
            display: flex;
        }

        .edit-actions .btn-sm {
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .edit-actions .btn-edit {
            background: var(--accent);
            color: #fff;
        }

        .edit-actions .btn-cancel {
            background: #e0e0ea;
            color: #333;
        }

        .edit-area {
            display: none;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
            margin-top: 6px;
            background: var(--bg);
            color: var(--text);
            resize: vertical;
            min-height: 60px;
        }

        .edit-area.active {
            display: block;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .card-footer .btn-sm {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .card-footer .btn-sm:hover {
            background: #fee2e2;
            color: #e11d48;
        }

        .empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
        }

        @media (max-width: 400px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-shuffle {
                width: 100%;
            }
            .font-controls input[type="range"] {
                width: 70px;
            }
            .filter-group select {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Шапка -->
    <div class="header">
        <h1>🧠 Лента</h1>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" aria-label="Тёмная тема">🌙</button>
        </div>
    </div>

    <!-- Панель шрифта -->
    <div class="font-panel">
        <label>🔤 Размер шрифта</label>
        <div class="font-controls">
            <button class="btn-small" id="fontDec">A−</button>
            <input type="range" id="fontSlider" min="0.7" max="1.6" step="0.05" value="1.0">
            <span class="size-label" id="fontSizeLabel">1.0</span>
            <button class="btn-small" id="fontInc">A+</button>
        </div>
    </div>

    <!-- Форма -->
    <div class="form-box">
        <input type="text" id="qInput" placeholder="❓ Вопрос..." autocomplete="off">
        <textarea id="aInput" placeholder="📝 Ответ..." autocomplete="off"></textarea>
        <div class="form-row">
            <input type="text" id="tagInput" placeholder="🏷️ Теги (через запятую)" autocomplete="off">
            <button class="btn-sm" id="addTagBtn">➕</button>
        </div>
        <button class="btn btn-primary" id="addBtn">➕ Добавить карточку</button>
    </div>

    <!-- Управление -->
    <div class="controls">
        <span class="counter" id="counter">📚 0 карточек</span>
        <div class="filter-group">
            <select id="tagFilter">
                <option value="">Все теги</option>
            </select>
            <button class="clear-filter" id="clearFilter">✕</button>
            <button class="btn btn-shuffle" id="shuffleBtn">🔀</button>
        </div>
    </div>

    <!-- Лента -->
    <div id="feed" class="feed"></div>

</div>

<script>
    // ===== Хранилище =====
    const STORAGE_KEY = 'memory_cards_data';
    const THEME_KEY = 'theme';
    const FONT_KEY = 'fontScale';

    let cards = loadCards();
    let filterTag = '';

    // ===== DOM =====
    const feed = document.getElementById('feed');
    const counter = document.getElementById('counter');
    const qInput = document.getElementById('qInput');
    const aInput = document.getElementById('aInput');
    const tagInput = document.getElementById('tagInput');
    const addTagBtn = document.getElementById('addTagBtn');
    const addBtn = document.getElementById('addBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const themeToggle = document.getElementById('themeToggle');
    const fontSlider = document.getElementById('fontSlider');
    const fontSizeLabel = document.getElementById('fontSizeLabel');
    const fontInc = document.getElementById('fontInc');
    const fontDec = document.getElementById('fontDec');
    const tagFilter = document.getElementById('tagFilter');
    const clearFilter = document.getElementById('clearFilter');

    // ===== Загрузка карточек =====
    function loadCards() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length) {
                    // ensure tags field exists
                    return parsed.map(c => ({ ...c, tags: c.tags || [] }));
                }
            }
        } catch (_) {}
        return [
            { q: "💡 В чем главный плюс Активного Припоминания?", a: "Оно заставляет мозг напрягаться, создавая прочные нейронные связи.", tags: ["🧠 память", "метод"] },
            { q: "📚 Как называется система карточек по ячейкам?", a: "Система Лейтнера (Leitner system).", tags: ["📚 обучение"] },
            { q: "🧠 Какой эффект укрепляет память лучше перечитывания?", a: "Эффект тестирования (Testing Effect).", tags: ["🧠 память"] }
        ];
    }

    function saveCards() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
        } catch (_) {}
        updateFilterOptions();
    }

    // ===== Теги =====
    function getAllTags() {
        const tagSet = new Set();
        cards.forEach(c => (c.tags || []).forEach(t => tagSet.add(t.trim())));
        return Array.from(tagSet).filter(t => t);
    }

    function updateFilterOptions() {
        const allTags = getAllTags();
        const currentVal = tagFilter.value;
        tagFilter.innerHTML = '<option value="">Все теги</option>';
        allTags.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            tagFilter.appendChild(opt);
        });
        if (currentVal && allTags.includes(currentVal)) {
            tagFilter.value = currentVal;
        } else {
            tagFilter.value = '';
            filterTag = '';
        }
    }

    function getFilteredCards() {
        if (!filterTag) return cards;
        return cards.filter(c => (c.tags || []).includes(filterTag));
    }

    // ===== Рендер =====
    function renderFeed() {
        const filtered = getFilteredCards();
        if (!filtered.length) {
            feed.innerHTML = `<div class="empty">📭 Нет карточек${filterTag ? ' с тегом "' + filterTag + '"' : ''}. Добавь свою первую!</div>`;
            counter.textContent = `📚 ${cards.length} карточек${filterTag ? ' (фильтр: ' + filterTag + ')' : ''}`;
            return;
        }

        counter.textContent = `📚 ${cards.length} карточек${filterTag ? ' (фильтр: ' + filterTag + ')' : ''}`;
        feed.innerHTML = '';

        filtered.forEach((card, idx) => {
            // find real index in cards array
            const realIndex = cards.indexOf(card);
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.dataset.index = realIndex;

            const tagsHtml = (card.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

            cardDiv.innerHTML = `
                <div class="question">${escapeHtml(card.q)}</div>
                ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
                <div class="answer-block" data-index="${realIndex}">
                    <span class="placeholder">👆 Нажми, чтобы открыть ответ</span>
                    <span class="answer-text">${card.a}</span>
                    <div class="edit-actions">
                        <button class="btn-sm btn-edit edit-btn" data-index="${realIndex}">✏️ Редактировать</button>
                        <button class="btn-sm btn-edit edit-tags-btn" data-index="${realIndex}">🏷️ Теги</button>
                    </div>
                    <textarea class="edit-area" data-index="${realIndex}"></textarea>
                    <div class="edit-actions" style="display:none;">
                        <button class="btn-sm btn-edit save-edit-btn" data-index="${realIndex}">💾 Сохранить</button>
                        <button class="btn-sm btn-cancel cancel-edit-btn" data-index="${realIndex}">Отмена</button>
                    </div>
                    <div class="edit-tags-area" style="display:none; margin-top:8px;">
                        <input type="text" class="tags-edit-input" placeholder="Теги через запятую" value="${escapeHtml((card.tags || []).join(', '))}">
                        <div style="display:flex; gap:6px; margin-top:6px;">
                            <button class="btn-sm btn-edit save-tags-btn" data-index="${realIndex}">💾 Сохранить теги</button>
                            <button class="btn-sm btn-cancel cancel-tags-btn" data-index="${realIndex}">Отмена</button>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-sm delete-btn" data-index="${realIndex}">🗑 Удалить</button>
                </div>
            `;

            feed.appendChild(cardDiv);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: #1a1a2e; color: #fff; padding: 10px 24px; border-radius: 30px;
                font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
                opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none;
            `;
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // ===== Действия =====
    function addCard() {
        const q = qInput.value.trim();
        const a = aInput.value.trim();
        const tagsRaw = tagInput.value.trim();
        if (!q || !a) {
            showToast('❌ Заполните вопрос и ответ');
            return;
        }
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        cards.unshift({ q, a, tags });
        qInput.value = '';
        aInput.value = '';
        tagInput.value = '';
        saveCards();
        renderFeed();
        updateFilterOptions();
        showToast('✅ Добавлено!');
    }

    function deleteCard(index) {
        if (index < 0 || index >= cards.length) return;
        if (!confirm('🗑 Удалить карточку?')) return;
        cards.splice(index, 1);
        saveCards();
        renderFeed();
        updateFilterOptions();
        showToast('🗑 Удалено');
    }

    function shuffleCards() {
        if (cards.length < 2) {
            showToast('🔀 Мало карточек для перемешивания');
            return;
        }
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        saveCards();
        renderFeed();
        showToast('🔀 Перемешано!');
    }

    // ===== Редактирование =====
    function openEdit(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');

        if (tagsArea) tagsArea.style.display = 'none';
        editArea.value = card.a;
        editArea.classList.add('active');
        editArea.style.display = 'block';
        editActions[0].style.display = 'none';
        editActions[1].style.display = 'flex';
        display.style.display = 'none';
        editArea.focus();
    }

    function openEditTags(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');
        const input = tagsArea.querySelector('.tags-edit-input');

        if (editArea) { editArea.style.display = 'none'; editArea.classList.remove('active'); }
        editActions[0].style.display = 'none';
        editActions[1].style.display = 'none';
        tagsArea.style.display = 'block';
        input.value = (card.tags || []).join(', ');
        input.focus();
    }

    function saveEdit(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const editArea = block.querySelector('.edit-area');
        const display = block.querySelector('.answer-text');
        const editActions = block.querySelectorAll('.edit-actions');

        const newText = editArea.value.trim();
        if (!newText) {
            showToast('❌ Ответ не может быть пустым');
            return;
        }

        card.a = newText;
        display.innerHTML = newText;
        saveCards();

        editArea.classList.remove('active');
        editArea.style.display = 'none';
        editActions[0].style.display = 'flex';
        editActions[1].style.display = 'none';
        display.style.display = 'block';

        block.classList.add('revealed');
        showToast('✅ Ответ обновлён');
    }

    function cancelEdit(block) {
        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');

        if (tagsArea) tagsArea.style.display = 'none';
        editArea.classList.remove('active');
        editArea.style.display = 'none';
        editActions[0].style.display = 'flex';
        editActions[1].style.display = 'none';
        display.style.display = 'block';

        block.classList.remove('revealed');
        showToast('❌ Отменено');
    }

    function saveTags(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const tagsArea = block.querySelector('.edit-tags-area');
        const input = tagsArea.querySelector('.tags-edit-input');
        const tagsRaw = input.value.trim();
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        card.tags = tags;
        saveCards();

        tagsArea.style.display = 'none';
        const editActions = block.querySelectorAll('.edit-actions');
        editActions[0].style.display = 'flex';
        block.classList.add('revealed');
        renderFeed();
        updateFilterOptions();
        showToast('✅ Теги обновлены');
    }

    function cancelTags(block) {
        const tagsArea = block.querySelector('.edit-tags-area');
        tagsArea.style.display = 'none';
        const editActions = block.querySelectorAll('.edit-actions');
        editActions[0].style.display = 'flex';
        showToast('❌ Отменено');
    }

    // ===== Тема =====
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
        try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
    }

    function loadTheme() {
        try {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        } catch (_) {}
    }

    // ===== Шрифт =====
    function setFontScale(value) {
        const clamped = Math.min(1.6, Math.max(0.7, value));
        const rounded = Math.round(clamped * 100) / 100;
        document.documentElement.style.setProperty('--text-scale', rounded);
        fontSlider.value = rounded;
        fontSizeLabel.textContent = rounded.toFixed(1);
        try { localStorage.setItem(FONT_KEY, String(rounded)); } catch (_) {}
    }

    function loadFontScale() {
        try {
            const saved = localStorage.getItem(FONT_KEY);
            if (saved) {
                const val = parseFloat(saved);
                if (!isNaN(val) && val >= 0.7 && val <= 1.6) {
                    setFontScale(val);
                    return;
                }
            }
        } catch (_) {}
        setFontScale(1.0);
    }

    // ===== Обработчики =====
    document.getElementById('feed').addEventListener('click', (e) => {
        const target = e.target;
        const block = target.closest('.answer-block');

        // toggle reveal
        if (block && !target.closest('.edit-actions') && !target.closest('.edit-area') && !target.closest('.edit-tags-area')) {
            block.classList.toggle('revealed');
            return;
        }

        // delete
        const delBtn = target.closest('.delete-btn');
        if (delBtn) {
            const index = parseInt(delBtn.dataset.index);
            if (!isNaN(index)) deleteCard(index);
            return;
        }

        // edit answer
        const editBtn = target.closest('.edit-btn');
        if (editBtn && !editBtn.classList.contains('edit-tags-btn')) {
            const block = editBtn.closest('.answer-block');
            if (block) openEdit(block);
            return;
        }

        // edit tags
        const editTagsBtn = target.closest('.edit-tags-btn');
        if (editTagsBtn) {
            const block = editTagsBtn.closest('.answer-block');
            if (block) openEditTags(block);
            return;
        }

        // save edit
        const saveBtn = target.closest('.save-edit-btn');
        if (saveBtn) {
            const block = saveBtn.closest('.answer-block');
            if (block) saveEdit(block);
            return;
        }

        // cancel edit
        const cancelBtn = target.closest('.cancel-edit-btn');
        if (cancelBtn) {
            const block = cancelBtn.closest('.answer-block');
            if (block) cancelEdit(block);
            return;
        }

        // save tags
        const saveTagsBtn = target.closest('.save-tags-btn');
        if (saveTagsBtn) {
            const block = saveTagsBtn.closest('.answer-block');
            if (block) saveTags(block);
            return;
        }

        // cancel tags
        const cancelTagsBtn = target.closest('.cancel-tags-btn');
        if (cancelTagsBtn) {
            const block = cancelTagsBtn.closest('.answer-block');
            if (block) cancelTags(block);
            return;
        }
    });

    addBtn.addEventListener('click', addCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    themeToggle.addEventListener('click', toggleTheme);

    qInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addCard();
    });
    aInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addCard();
        }
    });
    tagInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            addCard();
        }
    });
    addTagBtn.addEventListener('click', () => {
        // just focus on add, but we can add a quick tag from input
        const val = tagInput.value.trim();
        if (val) {
            // if there's already text, add comma
            // we just use as is
        }
        addCard();
    });

    fontSlider.addEventListener('input', (e) => {
        setFontScale(parseFloat(e.target.value));
    });
    fontInc.addEventListener('click', () => {
        const current = parseFloat(fontSlider.value) || 1.0;
        setFontScale(current + 0.1);
    });
    fontDec.addEventListener('click', () => {
        const current = parseFloat(fontSlider.value) || 1.0;
        setFontScale(current - 0.1);
    });

    tagFilter.addEventListener('change', (e) => {
        filterTag = e.target.value;
        renderFeed();
    });

    clearFilter.addEventListener('click', () => {
        filterTag = '';
        tagFilter.value = '';
        renderFeed();
    });

    // ===== Старт =====
    loadTheme();
    loadFontScale();
    updateFilterOptions();
    renderFeed();
    console.log('🧠 Лента Припоминания с тегами загружена!');

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>

</body>
</html>
